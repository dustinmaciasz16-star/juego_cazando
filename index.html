<!DOCTYPE html>
<html>
<head>
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="assets/css/cazando.css">
</head>
<body onload="iniciarJuego()">

  <h1>Juego Cazando</h1>
  <p>Autor: Dustin Macias</p>

  <div class="zona-juego">
    <canvas id="areaJuego" width="500" height="500"></canvas>

    <div class="controles">
      <div class="fila">
        <button id="btnArriba">⬆</button>
      </div>

      <div class="fila">
        <button id="btnIzquierda">⬅</button>
        <button id="btnAbajo">⬇</button>
        <button id="btnDerecha">➡</button>
      </div>
    </div>
  </div>


  <div class="panel">
    <span>🔺Puntos: <span id="puntos"></span></span>
    <span>⏱️Tiempo: <span id="tiempo"></span></span>
  </div>
    <button onclick="reiniciarJuego()">🔄 Reiniciar</button>
    <samp id="mensaje"></samp>

<script src="assets/js/cazando.js"></script>
<script src="assets/js/utils.js"></script>
</body>
</html>
