<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego Cazando</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tu CSS -->
  <link rel="stylesheet" href="assets/css/cazando.css">
</head>

<body onload="iniciarJuego()">

<div class="container text-center">

  <h1 class="mt-3">Juego Cazando</h1>
  <p>Autor: Dustin Macias</p>

  <!-- PANEL -->
  <div class="d-flex justify-content-center">
    <div class="panel">
      <span>🔺Puntos: <span id="puntos"></span></span>
      <span>⏱️Tiempo: <span id="tiempo"></span></span>
    </div>
  </div>

  <!-- ZONA DE JUEGO -->
  <div class="row justify-content-center align-items-center mt-3 g-4">

    <!-- CANVAS -->
    <div class="col-12 col-md-6">
      <canvas id="areaJuego"></canvas>
    </div>

    <!-- CONTROLES -->
    <div class="col-12 col-md-4">
      <div class="controles">

        <div class="fila">
          <button id="btnArriba">⬆</button>
        </div>

        <div class="fila">
          <button id="btnIzquierda">⬅</button>
          <button id="btnAbajo">⬇</button>
          <button id="btnDerecha">➡</button>
        </div>

      </div>
    </div>

  </div>

  <!-- BOTÓN -->
  <button class="mt-3" onclick="reiniciarJuego()">🔄 Reiniciar</button>

  <p id="mensaje"></p>

</div>

<script src="assets/js/cazando.js"></script>
<script src="assets/js/utils.js"></script>

</body>
</html>
